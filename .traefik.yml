displayName: request marker
type: middleware
import: github.com/qxsugar/request-marker
summary: mark requests according to configurable rules

testData:
  request-marker:
    tag: api
    logLevel: DEBUG
    markerKey: X-MARK
    versionHeader: X-Version
    identifyHeader: X-User-ID
    identifyCookie: user_id
    identifyQuery: uid

    redisConfig:
      enable: false
      addr: localhost:6379
      password: ""
      db: 0
      ruleListKeys: marker:api:rules
      refreshInterval: 15

    staticRules:
      - tag: api
        name: beta-users
        enable: true
        priority: 100
        type: identify
        markValue: beta
        userIds:
          - user001
          - user002

      - tag: api
        name: version-range
        enable: true
        priority: 90
        type: version
        markValue: v2
        minVersion: 2.0.0
        maxVersion: 2.9.9

      - tag: api
        name: canary-30
        enable: true
        priority: 80
        type: canary
        markValue: canary
        canary: 30

      - tag: api
        name: admin-path
        enable: true
        priority: 70
        type: path
        markValue: admin
        path: /admin
